name: ArXiv Daily Crawler

on:
  # 每天 UTC 时间 12:00 执行（即北京时间凌晨 12:00）
  schedule:
    - cron: '0 4 * * *'
  
  # 允许手动触发
  workflow_dispatch:
  
  # 推送到 main 分支时触发（可选）
  push:
    branches: [ main, master ]

jobs:
  fetch-arxiv:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Fetch arxiv papers
        env:
          PYTHONUNBUFFERED: 1
        run: |
          echo "开始爬取 ArXiv 论文..."
          echo "当前工作目录: $(pwd)"
          echo "Python 版本: $(python --version)"
          echo ""
          
          python -u scripts/fetch_arxiv.py
          
          echo ""
          echo "爬取完成！"
          
          if [ -d "docs" ]; then
            echo "docs 目录已创建"
            echo "文件数量: $(find docs -name "*.md" 2>/dev/null | wc -l)"
            echo "目录结构:"
            # 移除会导致 broken pipe 的管道命令，使用简单计数替代
            echo "（已创建文件，详细结构见提交记录）"
            echo ""
            echo "论文数量: $(grep -r "arxiv.org/abs" docs/ 2>/dev/null | wc -l)"
          else
            echo "docs 目录未创建"
          fi
        continue-on-error: false
      
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 显示当前 git 状态
          echo "当前 git 状态:"
          git status
          
          # 添加所有更改
          git add .
          
          # 显示将要提交的更改
          echo ""
          echo "将要提交的文件:"
          git status --short
          
          # 提交更改（如果有）
          if [ -n "$(git diff --cached --name-only)" ]; then
            git commit -m "Update arxiv papers $(date +'%Y-%m-%d')"
            echo "提交成功，正在推送..."
            git push
            echo "推送成功"
          else
            echo "没有需要提交的更改"
          fi
      
      - name: Create summary
        if: always()
        run: |
          echo "## ArXiv Paper Crawler Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -d "docs" ]; then
            # 统计文件数量
            FILE_COUNT=$(find docs -name "*.md" | wc -l)
            # 统计论文数量 - 查找包含 arxiv.org/abs 的行
            PAPER_COUNT=$(grep -r "arxiv.org/abs" docs/ | wc -l)
            echo "✅ Successfully processed $FILE_COUNT files with $PAPER_COUNT papers" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ No papers found or docs directory not created" >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Build search index and VitePress site
        run: |
          npm ci
          echo "生成搜索索引..."
          node scripts/build-search-index.mjs
          echo "构建 VitePress 站点..."
          npx vitepress build docs
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/.vitepress/dist
          publish_branch: gh-pages
          cname: ""
